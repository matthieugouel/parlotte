services:
  synapse-init:
    image: ghcr.io/element-hq/synapse:latest
    container_name: parlotte-synapse-init
    entrypoint: ["/start.py", "migrate_config"]
    environment:
      SYNAPSE_SERVER_NAME: "parlotte.test"
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_NO_TLS: "yes"
      SYNAPSE_ENABLE_REGISTRATION: "yes"
    volumes:
      - synapse-data:/data

  synapse:
    image: ghcr.io/element-hq/synapse:latest
    container_name: parlotte-synapse
    depends_on:
      synapse-init:
        condition: service_completed_successfully
    command:
      - "run"
      - "-m"
      - "synapse.app.homeserver"
      - "--config-path"
      - "/data/homeserver.yaml"
      - "--config-path"
      - "/extra/extra-config.yaml"
    volumes:
      - synapse-data:/data
      - ./synapse/extra-config.yaml:/extra/extra-config.yaml:ro
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8008/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  synapse-data:
