name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (parlotte-core, parlotte-ffi)
        run: cargo clippy -p parlotte-core -p parlotte-ffi --all-targets -- -D warnings

      - name: Unit tests (parlotte-core)
        run: cargo test -p parlotte-core

  swift:
    name: Swift state management tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build Apple bindings
        run: ./scripts/build-apple.sh debug

      - name: Run TestRunner
        working-directory: apple/Parlotte
        run: swift run TestRunner
